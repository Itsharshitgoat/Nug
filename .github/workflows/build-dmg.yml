name: Build DMG

on:
  workflow_dispatch: # Allows manual triggering of the workflow

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Select Xcode version
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Build the app
        run: |
          # Build the executable using Swift Package Manager
          swift build -c release

          # Find the executable
          EXECUTABLE_PATH=$(swift build -c release --show-bin-path)/Nuggs

          # Create an app bundle structure manually since this is a Swift Package
          mkdir -p build/Nuggs.app/Contents/MacOS
          mkdir -p build/Nuggs.app/Contents/Resources

          # Copy the executable into the bundle
          cp "$EXECUTABLE_PATH" build/Nuggs.app/Contents/MacOS/

          # Copy the icon file if it exists
          if [ -f "Nuggs/Resources/icon.icns" ]; then
            cp "Nuggs/Resources/icon.icns" build/Nuggs.app/Contents/Resources/
          fi

          # Create a basic Info.plist
          cat << 'EOF' > build/Nuggs.app/Contents/Info.plist
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleExecutable</key>
            <string>Nuggs</string>
            <key>CFBundleIdentifier</key>
            <string>com.example.Nuggs</string>
            <key>CFBundleIconFile</key>
            <string>icon.icns</string>
            <key>CFBundleName</key>
            <string>Nuggs</string>
            <key>CFBundleVersion</key>
            <string>1.0</string>
            <key>CFBundleShortVersionString</key>
            <string>1.0</string>
            <key>LSMinimumSystemVersion</key>
            <string>12.0</string>
          </dict>
          </plist>
          EOF

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Create DMG
        run: |
          # Use create-dmg to package the .app into a .dmg
          create-dmg \
            --volname "Nuggs Installer" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "Nuggs.app" 150 190 \
            --hide-extension "Nuggs.app" \
            --app-drop-link 450 190 \
            "Nuggs.dmg" \
            "build/"

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: Nuggs-macOS-App
          path: Nuggs.dmg
